name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.imgname.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: imgname
        env:
          REPO: ${{ github.repository }}
        run: |
          LOWER="${REPO,,}"
          echo "image=${{ env.REGISTRY }}/${LOWER}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imgname.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_BILLIONMAIL_URL=${{ secrets.VITE_BILLIONMAIL_URL }}
            VITE_BILLIONMAIL_HOSTNAME=${{ secrets.VITE_BILLIONMAIL_HOSTNAME }}
            VITE_DB_SCHEMA=${{ secrets.VITE_DB_SCHEMA }}
            VITE_APP_URL=${{ secrets.VITE_APP_URL }}
            VITE_ORS_API_KEY=${{ secrets.VITE_ORS_API_KEY }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, mat-tracker-pro]

    steps:
      - name: Deploy container
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}:latest
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Logging in to GHCR"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          echo "Pulling $IMAGE"
          docker pull "$IMAGE"

          echo "Swapping container"
          docker stop mat-tracker-pro 2>/dev/null || true
          docker rm mat-tracker-pro 2>/dev/null || true
          docker run -d \
            --name mat-tracker-pro \
            --restart unless-stopped \
            --network npm_npm_network \
            --log-driver json-file \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            -p 3000:80 \
            "$IMAGE"

          echo "Cleaning up old images"
          docker image prune -f

          sleep 3
          docker ps --filter name=mat-tracker-pro --format '{{.Names}}: {{.Status}}'

          echo "Logging out from GHCR"
          docker logout ghcr.io || true
